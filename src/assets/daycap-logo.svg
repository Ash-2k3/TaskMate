<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 36" fill="none" role="img" aria-label="DayCap">
  <defs>
    <linearGradient id="daycap-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Cap/arc mark: brim + rising arc (no antenna) -->
  <!-- Brim line -->
  <line x1="2" y1="22" x2="22" y2="22" stroke="url(#daycap-grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rising arc (quadratic bezier) -->
  <path d="M4 22 Q12 8 20 22" stroke="url(#daycap-grad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Wordmark -->
  <text
    x="30"
    y="26"
    font-family="Inter, system-ui, sans-serif"
    font-size="18"
    font-weight="600"
    fill="url(#daycap-grad)"
    dominant-baseline="auto"
  >DayCap</text>
</svg>
